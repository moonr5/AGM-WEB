name: Bug report
description: Something broken on the live or local site
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: url
    attributes:
      label: Page URL
      placeholder: https://agmaritim.com/en/
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Desktop
        - Mobile phone
        - Tablet
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 124, Safari iOS 17, etc.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open homepage on mobile
        2. Scroll past hero
        3. ...
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag images here or paste links
